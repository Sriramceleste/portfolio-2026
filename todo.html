<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | JS State Management</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Specific To-Do List Styles */
        .todo-container { max-width: 500px; margin: 2rem auto; background: var(--surface); padding: 2rem; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .input-group input { flex-grow: 1; }
        .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; justify-content: center; }
        .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .task-list { list-style: none; padding: 0; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--border); margin-bottom: 0.5rem; border-radius: 4px; }
        .task-item.completed span { text-decoration: line-through; color: var(--text-secondary); }
        .delete-btn { background: #ef4444; padding: 0.25rem 0.5rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <main class="todo-container">
        <h1>Task Manager</h1>
        
        <form id="todo-form" class="input-group">
            <input type="text" id="task-input" placeholder="e.g., Finalize SRMeet documentation..." required>
            <button type="submit">Add Task</button>
        </form>

        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="task-list" class="task-list"></ul>
    </main>

    <script src="todo.js"></script>
</body>
</html>
