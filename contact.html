<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Software Engineering Portfolio</title>
    <meta name="description" content="Get in touch to discuss software engineering roles, collaboration on C++ and Python projects, or networking.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header role="banner">
        <nav aria-label="Primary Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" role="main">
        
        <section aria-labelledby="contact-heading">
            <h1 id="contact-heading">Get in Touch</h1>
            <p>If you'd like to collaborate on network security automation, or if you just want to talk about optimizing TCP/IP stacks, drop me a message.</p>
            
            <form action="/submit-endpoint" method="POST" aria-label="Contact Form">
                
                <div class="form-group">
                    <label for="user-name">Full Name <span aria-hidden="true">*</span></label>
                    <input type="text" id="user-name" name="name" required aria-required="true" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="user-email">Email Address <span aria-hidden="true">*</span></label>
                    <input type="email" id="user-email" name="email" required aria-required="true" autocomplete="email" aria-describedby="email-hint">
                    <small id="email-hint">I will never share your email with anyone else.</small>
                </div>

                <div class="form-group">
                    <label for="user-message">Message <span aria-hidden="true">*</span></label>
                    <textarea id="user-message" name="message" rows="5" required aria-required="true"></textarea>
                </div>

                <button type="submit">Send Message</button>

            </form>
        </section>

    </main>

    <footer role="contentinfo">
        <p>&copy; <time datetime="2026">2026</time> Your Name. All rights reserved.</p>
    </footer>

</body>
</html>
