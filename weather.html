<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .weather-container { max-width: 600px; margin: 2rem auto; background: var(--surface); padding: 2rem; border-radius: 8px; border: 1px solid var(--border); }
        .search-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .search-form input { flex-grow: 1; }
        .error-message { background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 4px; margin-bottom: 1.5rem; display: none; border: 1px solid #f87171; }
        .loading-spinner { display: none; text-align: center; margin: 1.5rem 0; color: var(--text-secondary); }
        .weather-display { display: none; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
        .metric-card { background: var(--bg-primary); padding: 1rem; border-radius: 6px; border: 1px solid var(--border); text-align: center; }
        .metric-value { font-size: 1.5rem; font-weight: bold; color: var(--accent); margin-top: 0.5rem; }
    </style>
</head>
<body>
    <main class="weather-container">
        <h1>Weather Dashboard</h1>
        <p>Enter a city name to retrieve live metrics via an asynchronous REST API fetch.</p>

        <form id="weather-form" class="search-form">
            <input type="text" id="city-input" placeholder="e.g., London, Tokyo, Chennai..." required>
            <button type="submit">Search Weather</button>
        </form>

        <div id="error-display" class="error-message"></div>

        <div id="loading-display" class="loading-spinner">Fetching live metrics...</div>

        <section id="weather-display" class="weather-display">
            <h2 id="location-title">City Name</h2>
            <div class="metrics-grid">
                <div class="metric-card">
                    <h3>Temperature</h3>
                    <div id="temp-value" class="metric-value">--°C</div>
                </div>
                <div class="metric-card">
                    <h3>Relative Humidity</h3>
                    <div id="humidity-value" class="metric-value">--%</div>
                </div>
                <div class="metric-card">
                    <h3>Wind Speed</h3>
                    <div id="wind-value" class="metric-value">-- km/h</div>
                </div>
            </div>
        </section>
    </main>

    <script src="weather.js"></script>
</body>
</html>
